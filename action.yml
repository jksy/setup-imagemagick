name: "setup-imagemagick"
description: "Install prebuilt ImageMagick from jksy/imagemagick-build release assets"
author: "jksy"

inputs:
  version:
    description: "ImageMagick build version"
    required: true
  variant:
    description: "Build variant"
    required: false
    default: "avif-webp-pdf"
  install-prefix:
    description: "Install destination prefix"
    required: false
    default: "${{ runner.temp }}/imagemagick"
  add-to-path:
    description: "Add <prefix>/bin to PATH"
    required: false
    default: "true"
  export-env:
    description: "Export PKG_CONFIG_PATH and LD_LIBRARY_PATH"
    required: false
    default: "true"
  github-token:
    description: "GitHub token used when downloading release assets"
    required: false
    default: ""
  fail-if-missing:
    description: "Fail when release asset is missing"
    required: false
    default: "true"

outputs:
  prefix:
    description: "Installation prefix"
    value: "${{ steps.install.outputs.prefix }}"
  bin-dir:
    description: "Binary directory"
    value: "${{ steps.install.outputs.bin-dir }}"
  lib-dir:
    description: "Library directory"
    value: "${{ steps.install.outputs.lib-dir }}"
  pkg-config-path:
    description: "pkg-config directory"
    value: "${{ steps.install.outputs.pkg-config-path }}"
  magick-path:
    description: "Path to magick executable"
    value: "${{ steps.install.outputs.magick-path }}"

runs:
  using: "composite"
  steps:
    - id: install
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_VARIANT: ${{ inputs.variant }}
        INPUT_INSTALL_PREFIX: ${{ inputs.install-prefix }}
        INPUT_ADD_TO_PATH: ${{ inputs.add-to-path }}
        INPUT_EXPORT_ENV: ${{ inputs.export-env }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_FAIL_IF_MISSING: ${{ inputs.fail-if-missing }}
      run: |
        "$GITHUB_ACTION_PATH/install.sh"
