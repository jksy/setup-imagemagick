name: test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-imagemagick:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        use-custom-prefix: [false, true]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve ImageMagick build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="$(
            curl -fsSL \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              -H "User-Agent: setup-imagemagick-test" \
              https://api.github.com/repos/jksy/imagemagick-build/releases/latest |
            jq -r '.tag_name'
          )"
          if [[ -z "$tag" || "$tag" == "null" ]]; then
            echo "::error::Failed to resolve latest release tag from jksy/imagemagick-build"
            exit 1
          fi
          echo "version=${tag#v}" >>"$GITHUB_OUTPUT"

      - name: Setup ImageMagick
        id: setup-imagemagick
        uses: ./
        with:
          version: ${{ steps.version.outputs.version }}
          github-token: ${{ github.token }}
          install-prefix: ${{ matrix.use-custom-prefix && format('{0}/imagemagick-custom', runner.temp) || '' }}

      - name: Check install prefix output
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.use-custom-prefix }}" == "true" ]]; then
            expected_prefix="${RUNNER_TEMP}/imagemagick-custom"
          else
            expected_prefix="${RUNNER_TEMP}/imagemagick"
          fi

          actual_prefix="${{ steps.setup-imagemagick.outputs.prefix }}"
          actual_magick_path="${{ steps.setup-imagemagick.outputs.magick-path }}"
          if [[ "$actual_prefix" != "$expected_prefix" ]]; then
            echo "::error::Unexpected prefix. expected=$expected_prefix actual=$actual_prefix"
            exit 1
          fi

          expected_magick_path="$expected_prefix/bin/magick"
          if [[ "$actual_magick_path" != "$expected_magick_path" ]]; then
            echo "::error::Unexpected magick path. expected=$expected_magick_path actual=$actual_magick_path"
            exit 1
          fi

          test -x "$expected_magick_path"

      - name: Check magick version
        shell: bash
        run: |
          set -euo pipefail
          magick -version

      - name: Check formats
        shell: bash
        run: |
          set -euo pipefail
          magick -list format | grep -E "JPEG|PNG|WEBP|AVIF"

      - name: Check image export for multiple formats
        shell: bash
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          cd "$workdir"

          magick -size 64x64 gradient: input.png
          magick input.png output.jpg
          magick input.png output.webp
          magick input.png output.avif

          test -s output.jpg
          test -s output.webp
          test -s output.avif

      - name: Check PDF to PNG conversion
        shell: bash
        run: |
          set -euo pipefail
          command -v gs

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          cd "$workdir"

          python3 - <<'PY'
          from pathlib import Path

          lines = [
              b"%PDF-1.4\n",
              b"1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n",
              b"2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n",
              b"3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 200 200] /Resources << /Font << /F1 5 0 R >> >> /Contents 4 0 R >>\nendobj\n",
              b"4 0 obj\n<< /Length 37 >>\nstream\nBT /F1 24 Tf 30 100 Td (Hello PDF) Tj ET\nendstream\nendobj\n",
              b"5 0 obj\n<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>\nendobj\n",
          ]

          body = bytearray()
          offsets = [0]
          for chunk in lines[1:]:
              offsets.append(len(body) + len(lines[0]))
              body.extend(chunk)

          xref_start = len(lines[0]) + len(body)
          xref = [b"xref\n0 6\n", b"0000000000 65535 f \n"]
          for offset in offsets[1:]:
              xref.append(f"{offset:010d} 00000 n \n".encode())

          trailer = (
              b"trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n"
              + str(xref_start).encode()
              + b"\n%%EOF\n"
          )

          Path("input.pdf").write_bytes(lines[0] + body + b"".join(xref) + trailer)
          PY

          magick input.pdf[0] output.png
          test -s output.png

      - name: Check pkg-config
        shell: bash
        run: |
          set -euo pipefail
          pkg-config --modversion MagickCore

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Check RMagick install
        shell: bash
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          cd "$workdir"
          bundle init
          echo 'gem "rmagick"' >> Gemfile
          bundle config set path vendor/bundle
          bundle install
          bundle exec ruby -e 'require "rmagick"; puts Magick::Magick_version'
