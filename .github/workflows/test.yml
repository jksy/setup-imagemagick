name: test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-imagemagick:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        use-custom-prefix: [false, true]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Resolve ImageMagick build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="$(
            curl -fsSL \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              -H "User-Agent: setup-imagemagick-test" \
              https://api.github.com/repos/jksy/imagemagick-build/releases/latest |
            jq -r '.tag_name'
          )"
          if [[ -z "$tag" || "$tag" == "null" ]]; then
            echo "::error::Failed to resolve latest release tag from jksy/imagemagick-build"
            exit 1
          fi
          echo "version=${tag#v}" >>"$GITHUB_OUTPUT"

      - name: Setup ImageMagick
        id: setup-imagemagick
        uses: ./
        with:
          version: ${{ steps.version.outputs.version }}
          github-token: ${{ github.token }}
          install-prefix: ${{ matrix.use-custom-prefix && format('{0}/imagemagick-custom', runner.temp) || '' }}

      - name: Check install prefix output
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ matrix.use-custom-prefix }}" == "true" ]]; then
            expected_prefix="${RUNNER_TEMP}/imagemagick-custom"
          else
            expected_prefix="${RUNNER_TEMP}/imagemagick"
          fi

          actual_prefix="${{ steps.setup-imagemagick.outputs.prefix }}"
          actual_magick_path="${{ steps.setup-imagemagick.outputs.magick-path }}"
          if [[ "$actual_prefix" != "$expected_prefix" ]]; then
            echo "::error::Unexpected prefix. expected=$expected_prefix actual=$actual_prefix"
            exit 1
          fi

          expected_magick_path="$expected_prefix/bin/magick"
          if [[ "$actual_magick_path" != "$expected_magick_path" ]]; then
            echo "::error::Unexpected magick path. expected=$expected_magick_path actual=$actual_magick_path"
            exit 1
          fi

          test -x "$expected_magick_path"

      - name: Check magick version
        shell: bash
        run: |
          set -euo pipefail
          magick -version

      - name: Check formats
        shell: bash
        run: |
          set -euo pipefail
          magick -list format | grep -E "JPEG|PNG|WEBP|AVIF"

      - name: Check image export for multiple formats
        shell: bash
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          cd "$workdir"

          magick -size 64x64 gradient: input.png
          magick input.png output.jpg
          magick input.png output.webp
          magick input.png output.avif

          test -s output.jpg
          test -s output.webp
          test -s output.avif

      - name: Check PDF to PNG conversion
        shell: bash
        run: |
          set -euo pipefail
          command -v gs

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          cd "$workdir"

          python3 "${GITHUB_WORKSPACE}/.github/scripts/generate-test-pdf.py" input.pdf

          magick input.pdf[0] output.png
          test -s output.png

      - name: Check pkg-config
        shell: bash
        run: |
          set -euo pipefail
          pkg-config --modversion MagickCore

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.9"
          bundler-cache: false

      - name: Check RMagick install
        shell: bash
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          cd "$workdir"
          bundle init
          echo 'gem "rmagick"' >> Gemfile
          bundle config set path vendor/bundle
          bundle install
          bundle exec ruby -e 'require "rmagick"; puts Magick::Magick_version'
          python3 "${GITHUB_WORKSPACE}/.github/scripts/generate-test-pdf.py" input-rmagick.pdf
          bundle exec ruby -e 'require "rmagick"; img = Magick::Image.read("input-rmagick.pdf[0]").first; img.write("output-rmagick.png"); raise "empty output-rmagick.png" unless File.size?("output-rmagick.png")'

  setup-imagemagick-amzn2023:
    runs-on: ubuntu-24.04
    container: amazonlinux:2023

    steps:
      - name: Install dependencies
        run: dnf install -y tar gzip findutils jq python3 git pkgconf-pkg-config

      - uses: actions/checkout@v6

      - name: Resolve ImageMagick build version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="$(
            curl -fsSL \
              -H "Authorization: Bearer ${{ github.token }}" \
              -H "Accept: application/vnd.github+json" \
              -H "User-Agent: setup-imagemagick-test" \
              https://api.github.com/repos/jksy/imagemagick-build/releases/latest |
            jq -r '.tag_name'
          )"
          if [[ -z "$tag" || "$tag" == "null" ]]; then
            echo "::error::Failed to resolve latest release tag from jksy/imagemagick-build"
            exit 1
          fi
          echo "version=${tag#v}" >>"$GITHUB_OUTPUT"

      - name: Setup ImageMagick
        id: setup-imagemagick
        uses: ./
        with:
          version: ${{ steps.version.outputs.version }}
          github-token: ${{ github.token }}

      - name: Check magick version
        shell: bash
        run: |
          set -euo pipefail
          magick -version

      - name: Check formats
        shell: bash
        run: |
          set -euo pipefail
          magick -list format | grep -E "JPEG|PNG|WEBP|AVIF"

      - name: Check image export for multiple formats
        shell: bash
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          cd "$workdir"

          magick -size 64x64 gradient: input.png
          magick input.png output.jpg
          magick input.png output.webp
          magick input.png output.avif

          test -s output.jpg
          test -s output.webp
          test -s output.avif

      - name: Check PDF to PNG conversion
        shell: bash
        run: |
          set -euo pipefail
          command -v gs

          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          cd "$workdir"

          python3 "${GITHUB_WORKSPACE}/.github/scripts/generate-test-pdf.py" input.pdf

          magick input.pdf[0] output.png
          test -s output.png

      - name: Check pkg-config
        shell: bash
        run: |
          set -euo pipefail
          pkg-config --modversion MagickCore

  version-format:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        version:
          - "7.1.2-18"           # rolling release (no date)
          - "7.1.2-18-20260405"  # snapshot release (with date)
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup ImageMagick
        uses: ./
        with:
          version: ${{ matrix.version }}
          github-token: ${{ github.token }}

      - name: Check magick version
        shell: bash
        run: |
          set -euo pipefail
          magick -version
