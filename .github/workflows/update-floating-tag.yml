name: update-floating-tag

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  update-floating-tag:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Force-move floating tag
        run: |
          tag="${GITHUB_REF_NAME}"
          major="${tag%%.*}"
          git tag -f "${major}"
          git push origin "refs/tags/${major}" --force
